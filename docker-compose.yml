services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartscout
      POSTGRES_USER: smartscout
      POSTGRES_PASSWORD: smartscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartscout"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smartscout
      SPRING_DATASOURCE_USERNAME: smartscout
      SPRING_DATASOURCE_PASSWORD: smartscout
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
